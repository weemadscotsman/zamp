        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                registrations.forEach(function(registration) {
                    registration.unregister();
                });
            });
        }
        // Polyfill crypto.randomUUID
        if (!crypto.randomUUID) {
            crypto.randomUUID = function() {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    var r = Math.random() * 16 | 0;
                    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);

    <!-- Panel toggle tabs (always visible) -->
    <div id="toggle-left" class="panel-toggle-tab" title="Toggle left panel (L)">L</div>
    <div id="toggle-right" class="panel-toggle-tab" title="Toggle right panel (R)">R</div>

    <div id="toggle-bottom" class="panel-toggle-tab" title="Toggle bottom panel (B)">BTM</div>

    <script>
    (function() {
      var pairs = [
        ['toggle-left', 'gotham-hud-left'],
        ['toggle-right', 'gotham-hud-right'],
        ['toggle-top', 'gotham-hud-top'],
        ['toggle-bottom', 'gotham-hud-bottom']
      ];
      pairs.forEach(function(p) {
        var btn = document.getElementById(p[0]);
        var panel = document.getElementById(p[1]);
        if (btn && panel) {
          btn.addEventListener('click', function() { panel.classList.toggle('collapsed'); });
          btn.addEventListener('touchend', function(e) { e.preventDefault(); panel.classList.toggle('collapsed'); });
        }
      });
      // Keyboard: H = toggle all panels
      document.addEventListener('keydown', function(e) {
        if (e.target.matches('input,textarea')) return;
        if (e.code === 'KeyH') {
          pairs.forEach(function(p) { document.getElementById(p[1])?.classList.toggle('collapsed'); });
        }
      });
    })();
    </script>

    <!-- WebSocket Data Connection -->
    <script>
        (function() {
            var reconnectDelay = 2000;
            var maxDelay = 30000;

            // Buffer data until entity system is ready
            window._gothamDataBuffer = [];
            window._gothamDataReady = false;

            function dispatchData(data) {
                if (window._gothamDataReady && window.gothamSystem) {
                    // System ready - dispatch directly
                    window.dispatchEvent(new CustomEvent('gotham-data', { detail: data }));
                } else {
                    // System not ready - buffer it
                    window._gothamDataBuffer.push(data);
                    console.log('[GOTHAM] Buffered data snapshot (' + window._gothamDataBuffer.length + ' pending)');
                }
            }

            // Called by gotham-init.js when entity system is ready
            window._gothamFlushDataBuffer = function() {
                window._gothamDataReady = true;
                if (window._gothamDataBuffer.length > 0) {
                    console.log('[GOTHAM] Flushing ' + window._gothamDataBuffer.length + ' buffered data snapshots');
                    // Only replay the LAST buffered snapshot (most complete)
                    var last = window._gothamDataBuffer[window._gothamDataBuffer.length - 1];
                    window._gothamDataBuffer = [];
                    window.dispatchEvent(new CustomEvent('gotham-data', { detail: last }));
                }
                // Also fetch fresh data as backup
                fetch('/api/data').then(function(r) { return r.json(); }).then(function(data) {
                    console.log('[GOTHAM] Fresh /api/data fetch for initial render');
                    window.dispatchEvent(new CustomEvent('gotham-data', { detail: data }));
                }).catch(function(err) { console.warn('[GOTHAM] /api/data fetch failed:', err); });
            };

            function connect() {
                var host = window.location.hostname + ":3002";
                var ws = new WebSocket('ws://' + host);
                window._gothamWS = ws;

                ws.onopen = function() {
                    console.log('[GOTHAM] WebSocket connected');
                    reconnectDelay = 2000;
                };

                ws.onmessage = function(e) {
                      try {
                          var msg = JSON.parse(e.data);
                          if (msg.data) {
                              dispatchData(msg.data);
                          }
                          if (msg.type === 'agent_command') {
                              window.dispatchEvent(new CustomEvent('gotham-agent-command', { detail: msg }));
                          }
                      } catch (err) {
                          console.warn('[GOTHAM] Bad message:', err.message);
                      }
                };

                ws.onclose = function() {
                    console.log('[GOTHAM] Reconnecting in ' + (reconnectDelay / 1000) + 's...');
                    setTimeout(connect, reconnectDelay);
                    reconnectDelay = Math.min(reconnectDelay * 1.5, maxDelay);
                };

                ws.onerror = function() {
                    ws.close();
                };
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', connect);
            } else {
                connect();
            }
        })();
    </script>
